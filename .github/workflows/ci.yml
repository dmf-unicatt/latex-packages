name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * TUE"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND="noninteractive"
          sudo apt-get -qq update
          sudo apt-get install -qq python3-pip
          rm -f /usr/lib/python3.*/EXTERNALLY-MANAGED
          python3 -m pip install ruff
      - name: Run ruff
        run: |
          python3 -m ruff format --check .
          python3 -m ruff check .
      - name: Run mypy
        run: |
          python3 -m mypy .

  test-packages-in-docker:
    strategy:
      matrix:
        include:
          - tag-name: ubuntu-24.04
          - tag-name: ubuntu-24.10
          - tag-name: ubuntu-25.04
          - tag-name: debian-13
          - tag-name: ubuntu-25.10
          - tag-name: debian-testing
          - tag-name: debian-unstable
      fail-fast: false
    container: ghcr.io/dmf-unicatt/latex-packages:latest-${{ matrix.tag-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Show texlive version
        run: dpkg -s texlive-base | grep Version
      - name: Ensure that \LaTeXTwentyFivefalse at the end of packages/if-latex-twentyfive.sty is always commented when committing
        run: |
          git config --global --add safe.directory $PWD
          git-hooks/pre-commit
      - name: Run unit tests
        run: |
          cd tests
          python run_tests.py

  test-packages-in-act:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install act
        run: |
          curl -s https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash
      - name: Setup act config
        run: |
          echo "-P ubuntu-latest=medium" > .actrc
      - name: Move docker temporary folder to region with free disk space
        run: |
          sudo cp -rf /var/lib/docker /mnt/
          sudo rm -rf /var/lib/docker
          sudo ln -s /mnt/docker /var/lib/
          sudo systemctl restart docker
      - name: Run tests under act
        run: |
          export PATH=$PWD/bin:$PATH
          cd tests
          python run_act_tests.py
