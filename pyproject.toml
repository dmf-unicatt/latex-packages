[tool.ruff]
line-length = 80
target-version = "py312"

[tool.ruff.lint]
select = [
    "ANN", "D", "E", "F", "FLY", "I", "ICN", "N", "Q", "RUF", "UP", "W"
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/unit/tex-notebook/test_call_code.tex" = ["F821"]
"tests/unit/tex-notebook/test_pycell_mdcell.tex" = ["F821"]

[tool.ruff.lint.pycodestyle]
max-doc-length = 80

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ty.environment]
python-version = "3.12"
